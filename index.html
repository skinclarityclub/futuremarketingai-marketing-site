<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Base Title (will be overridden by react-helmet-async) -->
    <title>Future AI — AI Systems That Run Your Business</title>
    
    <!-- Base Meta Tags -->
    <meta name="description" content="Future AI builds AI automation systems for SaaS and e-commerce companies. Marketing automation, custom workflows, chatbots, and voice agents — we implement AI that delivers measurable results." />
    <meta name="keywords" content="AI marketing, marketing automation, ROI calculator, marketing platform, conversion optimization" />
    <meta name="author" content="Future AI" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Future AI" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="nl_NL" />
    <meta property="og:title" content="Future AI — AI Implementation Partner" />
    <meta property="og:description" content="We build AI systems that run your business. Marketing, automations, chatbots, voice agents — all under one roof." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@FutureAI" />
    <meta name="twitter:creator" content="@FutureAI" />
    
    <!-- Canonical (will be overridden per page) -->
    <link rel="canonical" href="https://future-marketing.ai/" />
    
    <!-- Favicon & Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    
    <!-- Google Analytics 4 -->
    <!-- Note: GA4 is initialized via react-ga4 in App.tsx -->
    <!-- This script is handled programmatically in the React app -->
    
    <!-- Fonts - Optimized for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter Variable Font (all weights in one file) + JetBrains Mono (only weight 400) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900&family=JetBrains+Mono:wght@400&display=swap&subset=latin" rel="stylesheet" />
    
    <!-- Satoshi Font (Variable) -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@1,300..900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
