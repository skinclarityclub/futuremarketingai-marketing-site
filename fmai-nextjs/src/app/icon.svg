<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Edges from the central hub to each node (mirrors public/logo.png) -->
  <line x1="16" y1="17" x2="9" y2="9.5" stroke="#00d4aa" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="17" x2="22" y2="25" stroke="#00d4aa" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="17" x2="23" y2="9.5" stroke="#f5a623" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Nodes: teal hub + 2 teal spokes, amber highlighted node with halo -->
  <circle cx="9" cy="9.5" r="3" fill="#00d4aa"/>
  <circle cx="22" cy="25" r="2.8" fill="#00d4aa"/>
  <circle cx="16" cy="17" r="3.4" fill="#00d4aa"/>
  <circle cx="23" cy="9.5" r="4.6" fill="#f5a623" opacity="0.3"/>
  <circle cx="23" cy="9.5" r="3.4" fill="#f5a623"/>
</svg>
